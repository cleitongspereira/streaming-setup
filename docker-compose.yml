networks:
  traefik_public:
    external: true

services:

  # ─────────────────────────────────────────────────────────────
  # Jellyfin — Media Server (filmes, séries, música)
  # ─────────────────────────────────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.${DOMAIN}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config:z
      - ${STORAGE_PATH}/media/movies:/data/movies:shared
      - ${STORAGE_PATH}/media/tv:/data/tv:shared
      - ${STORAGE_PATH}/media/music:/data/music:shared
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.routers.jellyfin.service=jellyfin"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  # ─────────────────────────────────────────────────────────────
  # Navidrome — Music Streaming Server
  # ─────────────────────────────────────────────────────────────
  navidrome:
    image: ghcr.io/navidrome/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
    volumes:
      - ${CONFIG_PATH}/navidrome:/data:z
      - ${STORAGE_PATH}/media/music:/music:shared
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.navidrome.rule=Host(`navidrome.${DOMAIN}`)"
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls.certresolver=cloudflare"
      - "traefik.http.routers.navidrome.service=navidrome"
      - "traefik.http.services.navidrome.loadbalancer.server.port=4533"

  # ─────────────────────────────────────────────────────────────
  # Radarr — Gerenciador de Filmes
  # ─────────────────────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config:z
      - ${STORAGE_PATH}/media/movies:/movies:z
      - ${STORAGE_PATH}/downloads:/downloads:z
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  # ─────────────────────────────────────────────────────────────
  # Sonarr — Gerenciador de Séries
  # ─────────────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config:z
      - ${STORAGE_PATH}/media/tv:/tv:z
      - ${STORAGE_PATH}/downloads:/downloads:z
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  # ─────────────────────────────────────────────────────────────
  # Lidarr — Gerenciador de Música
  # ─────────────────────────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/lidarr:/config:z
      - ${STORAGE_PATH}/media/music:/music:z
      - ${STORAGE_PATH}/downloads:/downloads:z
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.${DOMAIN}`)"
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.lidarr.service=lidarr"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"

  # ─────────────────────────────────────────────────────────────
  # Bazarr — Gerenciador de Legendas Automáticas
  # ─────────────────────────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config:z
      - ${STORAGE_PATH}/media/movies:/movies:z
      - ${STORAGE_PATH}/media/tv:/tv:z
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.bazarr.service=bazarr"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  # ─────────────────────────────────────────────────────────────
  # Transmission — Cliente Torrent
  # Autenticação desativada — acesso protegido pelo Cloudflare Tunnel
  # ─────────────────────────────────────────────────────────────
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/transmission:/config:z
      - ${STORAGE_PATH}/downloads:/downloads:z
      - ${STORAGE_PATH}/downloads/watch:/watch:z
    ports:
      - "51413:51413"
      - "51413:51413/udp"
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transmission.rule=Host(`transmission.${DOMAIN}`)"
      - "traefik.http.routers.transmission.entrypoints=websecure"
      - "traefik.http.routers.transmission.tls.certresolver=cloudflare"
      - "traefik.http.routers.transmission.service=transmission"
      - "traefik.http.services.transmission.loadbalancer.server.port=9091"
      - "traefik.http.routers.transmission.middlewares=transmission-redirect@docker"
      - "traefik.http.middlewares.transmission-redirect.redirectregex.regex=^https://transmission.${DOMAIN}/$$"
      - "traefik.http.middlewares.transmission-redirect.redirectregex.replacement=https://transmission.${DOMAIN}/transmission/web/"
      - "traefik.http.middlewares.transmission-redirect.redirectregex.permanent=true"

  # ─────────────────────────────────────────────────────────────
  # Whisparr — Gerenciador de Conteúdo Adulto
  # ─────────────────────────────────────────────────────────────
  whisparr:
    image: ghcr.io/thespad/whisparr:latest
    container_name: whisparr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/whisparr:/config:z
      - ${STORAGE_PATH}/media/adult:/data/adult:z
      - ${STORAGE_PATH}/downloads:/downloads:z
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whisparr.rule=Host(`whisparr.${DOMAIN}`)"
      - "traefik.http.routers.whisparr.entrypoints=websecure"
      - "traefik.http.routers.whisparr.tls.certresolver=cloudflare"
      - "traefik.http.routers.whisparr.service=whisparr"
      - "traefik.http.services.whisparr.loadbalancer.server.port=6969"

  # ─────────────────────────────────────────────────────────────
  # Komga — Servidor de Quadrinhos e Mangás
  # Heap Java limitada a 256MB para reduzir uso de memória
  # ─────────────────────────────────────────────────────────────
  komga:
    image: gotson/komga:latest
    container_name: komga
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
      - JAVA_TOOL_OPTIONS=-Xmx256m
    volumes:
      - ${CONFIG_PATH}/komga:/config:z
      - ${STORAGE_PATH}/media/comics:/data:shared
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komga.rule=Host(`komga.${DOMAIN}`)"
      - "traefik.http.routers.komga.entrypoints=websecure"
      - "traefik.http.routers.komga.tls.certresolver=cloudflare"
      - "traefik.http.routers.komga.service=komga"
      - "traefik.http.services.komga.loadbalancer.server.port=25600"

  # ─────────────────────────────────────────────────────────────
  # Stash — Player & gerenciador de vídeos adultos (Whisparr)
  # https://stash.${DOMAIN}
  # Todo o conteúdo centralizado em /media/adult/
  #   videos/    → arquivos do Whisparr
  #   generated/ → thumbnails e previews
  #   metadata/  → metadados das cenas
  #   cache/     → cache temporário
  # ─────────────────────────────────────────────────────────────
  stash:
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    environment:
      - STASH_STASH=/data/adult/videos/
      - STASH_GENERATED=/data/adult/generated/
      - STASH_METADATA=/data/adult/metadata/
      - STASH_CACHE=/data/adult/cache/
      - STASH_PORT=9999
    volumes:
      - ${CONFIG_PATH}/stash:/root/.stash:z
      - ${STORAGE_PATH}/media/adult:/data/adult:z
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stash.rule=Host(`stash.${DOMAIN}`)"
      - "traefik.http.routers.stash.entrypoints=websecure"
      - "traefik.http.routers.stash.tls.certresolver=cloudflare"
      - "traefik.http.routers.stash.service=stash"
      - "traefik.http.services.stash.loadbalancer.server.port=9999"

  # ─────────────────────────────────────────────────────────────
  # Photoprism — Álbum de fotos virtual
  # https://fotos.${DOMAIN}
  # Roda sem user: fixo — a imagem gerencia permissões internamente
  # via PUID/PGID com DISABLE_CHOWN=false
  # ─────────────────────────────────────────────────────────────
  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    restart: unless-stopped
    environment:
      PHOTOPRISM_ADMIN_USER: "admin"
      PHOTOPRISM_ADMIN_PASSWORD: "${PHOTOPRISM_PASSWORD}"
      PHOTOPRISM_AUTH_MODE: "password"
      PHOTOPRISM_SITE_URL: "https://fotos.${DOMAIN}"
      PHOTOPRISM_ORIGINALS_LIMIT: 5000
      PHOTOPRISM_HTTP_COMPRESSION: "gzip"
      PHOTOPRISM_LOG_LEVEL: "info"
      PHOTOPRISM_READONLY: "false"
      PHOTOPRISM_DISABLE_CHOWN: "false"
      PHOTOPRISM_DISABLE_WEBDAV: "false"
      PHOTOPRISM_DISABLE_SETTINGS: "false"
      PHOTOPRISM_DISABLE_TENSORFLOW: "false"
      PHOTOPRISM_DISABLE_FACES: "false"
      PHOTOPRISM_DISABLE_CLASSIFICATION: "false"
      PHOTOPRISM_SIDECAR_YAML: "true"
      PHOTOPRISM_BACKUP_ALBUMS: "true"
      PHOTOPRISM_BACKUP_DATABASE: "true"
      PHOTOPRISM_BACKUP_SCHEDULE: "daily"
      PHOTOPRISM_AUTO_INDEX: 300
      PHOTOPRISM_DATABASE_DRIVER: "sqlite"
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
    volumes:
      - ${CONFIG_PATH}/photoprism:/photoprism/storage:z
      - ${STORAGE_PATH}/media/photos:/photoprism/originals:shared
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.photoprism.rule=Host(`fotos.${DOMAIN}`)"
      - "traefik.http.routers.photoprism.entrypoints=websecure"
      - "traefik.http.routers.photoprism.tls.certresolver=cloudflare"
      - "traefik.http.routers.photoprism.service=photoprism"
      - "traefik.http.services.photoprism.loadbalancer.server.port=2342"